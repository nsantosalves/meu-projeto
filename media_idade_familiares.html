<script>

var mostra = function(frase) {
	document.write(frase + "<br>")
};
	
var totalDeFamiliares  = parseInt(prompt("Quantos familiares sao?"));

var somaDeIdades = 0;

var numero = 1;
while(numero <= totalDeFamiliares) {
	var idade = parseInt(prompt("Qual e a idade?"));
	somaDeIdades = somaDeIdades + idade;
	
	numero++;
}

var media = somaDeIdades / totalDeFamiliares;
	mostra("A media das idades e: " + media);

</script>
