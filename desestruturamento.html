<script>

const suco = {
sabor: 'uva',
quantidade: '500ml'
}
const doce = {
tipo: 'açucar'
}
function descreveSuco({sabor, quantidade}, {tipo}) {
return `Este suco é de sabor ${sabor} e possui ${quantidade} ado
cicado com ${tipo}`;
}
descreveSuco(suco, doce);

console.log(suco, doce);

</script>
