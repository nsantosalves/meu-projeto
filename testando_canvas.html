<canvas id="tela" width="600" height="400"><canvas/>

<script>

var tela = document.getElementById("tela");
var c = tela.getContext("2d");

c.fillStyle = "green";  
c.fillRect(0, 0, 600, 600);

c.fillStyle="yellow";
c.beginPath();
c.moveTo(300, 0);
c.lineTo(600, 200);
c.lineTo(300, 400);
c.lineTo(0, 200);
c.fill();

c.fillStyle = "red"
c.fillRect(0, 400, 600, 100);

c.fillStyle="blue";
c.beginPath();
c.arc(300, 200, 50, 0, 2*Math.PI);
c.fill();


</script>
